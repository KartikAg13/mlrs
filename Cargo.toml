[package]
name = "mlrs"
version = "0.1.1"
edition = "2024"
license = "Apache-2.0"
authors = ["KartikAg13"]
repository = "https://github.com/KartikAg13/mlrs"
description = "High-performance machine learning library in Rust"
keywords = ["machine-learning", "ml"]
categories = ["algorithms"]

[dependencies]
log = "0.4.29"
ndarray = "0.17.2"
polars = "0.53.0"
rayon = "1.11.0"
thiserror = "2.0.18"

[dev-dependencies]
criterion = { version = "0.8.2", features = ["html_reports"] }
tempfile = "3.26.0"

[[bench]]
name = "assign_type_bench"
harness = false
